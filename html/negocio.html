<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Negocios PRO</title>

<link rel="stylesheet" href="../estiloscss/negocio.css">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<section class="business-page">
<div class="container">

<h1 class="section-title">Nuestros Negocios</h1>

<div class="top-bar">
<input type="text" id="searchInput" placeholder="Buscar negocio...">

<select id="categoryFilter">
<option value="all">Todas las categorías</option>
<option value="comida">Comida</option>
<option value="hotel">Hotel</option>
<option value="tienda">Tienda</option>
</select>

<select id="ratingFilter">
<option value="0">Todas las estrellas</option>
<option value="4">4⭐ o más</option>
<option value="3">3⭐ o más</option>
</select>

<select id="sortFilter">
<option value="rating">Mejor calificación</option>
<option value="name">Alfabético</option>
</select>

<button id="favoritesBtn">❤️ Favoritos</button>
<button id="darkModeBtn">🌙</button>
</div>

<p id="resultCount" class="result-count"></p>
<div id="businessContainer"></div>

</div>
</section>

<!-- MODAL PERFIL -->
<div id="modal" class="modal">
<div class="modal-content">
<span id="closeModal">&times;</span>
<div id="modalBody"></div>
</div>
</div>

<script src="../archivosjs/negocio.js"></script>
</body>
</html>
