<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - BizNova Corp</title>

    <link rel="stylesheet" href="../estiloscss/registro.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="btn-volver">
            ← Volver
        </a>

        <div class="logo-container">
            <img src="../imagenes/logo-removebg-preview.png" alt="Logo">
        </div>
    </nav>

    <main class="main-container">
        <div class="registro-card">

            <div class="title">
                <h1>Crear Cuenta</h1>
            </div>

            <form class="formulario">

                <div class="input-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="input-group">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="****" required>
                </div>

                <div class="input-group">
                    <label for="confirmar">Confirmar contraseña</label>
                    <input type="password" id="confirmar" placeholder="****" required>
                </div>

                <button type="submit" class="btn-registrar">
                    Registrarse
                </button>

                <p class="login-link">
                    ¿Ya tienes cuenta? <a href="/html/login.html">Inicia sesión</a>
                </p>

            </form>
        </div>
    </main>

</body>

</html>
