<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sube de Nivel - Mapa</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Configuración personalizada de Tailwind -->


    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="../mapa_niveles/style.css">
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header
        class="sticky top-0 z-20 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-2xl overflow-hidden shadow-lg">
                <img src="/juego-biznova/img/WhatsApp Image 2026-02-28 at 7.03.12 PM.jpeg" alt="Logo Biznova"
                    class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="text-lg font-bold leading-tight">Sube de Nivel</h1>
                <p class="text-xs text-slate-500 dark:text-slate-400">BIZNOVA CORP</p>
            </div>
        </div>
        <div class="flex items-center rounded-full border border-primary/20">
            <a href="http://127.0.0.1:5503/html/index.html" class="btn-home">
                <i class="bi bi-house-door-fill"></i> Volver a Inicio
            </a>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="flex-1 relative overflow-y-auto grid-bg p-6 pb-24 bg-[#ff8c00]/10">
        <div class="max-w-md mx-auto relative">

            <!-- Información superior del mapa -->
            <div class="mb-8 text-center">
                <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white mb-2">Mapa de Niveles</h2>
                <div
                    class="bg-white dark:bg-slate-800 rounded-xl p-4 shadow-sm border border-slate-200 dark:border-slate-700">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium">Progreso del Camino</span>
                        <span class="text-sm font-bold text-primary">2 de 3 Niveles</span>
                    </div>
                    <div class="w-full bg-slate-100 dark:bg-slate-700 h-3 rounded-full overflow-hidden">
                        <div class="bg-primary h-full rounded-full" style="width: 40%;"></div>
                    </div>
                    <p class="text-xs text-slate-500 mt-2">
                        Siguiente reto: <span class="font-semibold text-slate-700 dark:text-slate-300 text-sm">Nivel
                            3</span>
                    </p>
                </div>
            </div>

            <!-- Camino gamificado (niveles) -->
            <div id="contenedor-niveles" class="relative flex flex-col items-center gap-16 py-8">
                <div id="nivel-3" class="level-node relative z-10 flex flex-col items-center group translate-x-12"
                    data-url="../nivel_3/index.html">
                    <div
                        class="lock-icon hidden absolute -top-2 -right-2 bg-slate-400 text-white rounded-full p-1 border-2 border-white dark:border-slate-800">
                        <span class="material-symbols-outlined text-sm">lock</span>
                    </div>
                    <div
                        class="main-card w-28 h-28 bg-white dark:bg-slate-800 rounded-3xl flex items-center justify-center shadow-xl border-4 border-slate-300 transition-all">
                        <span class="material-symbols-outlined text-5xl text-slate-400">campaign</span>
                    </div>
                    <div class="status-badge mt-4 bg-primary px-6 py-2 rounded-full shadow-lg hidden">
                        <span class="text-sm font-bold text-white uppercase tracking-wider">¡Juega Ahora!</span>
                    </div>
                    <p class="mt-2 text-base font-extrabold text-slate-900 dark:text-white">Nivel 3</p>
                </div>

                <div id="nivel-2" class="level-node relative z-10 flex flex-col items-center group -translate-x-10"
                    data-url="../nivel_2/index.html">
                    <div
                        class="main-card w-24 h-24 bg-white dark:bg-slate-800 rounded-2xl flex items-center justify-center shadow-md border-2 border-slate-300">
                        <span class="material-symbols-outlined text-4xl text-slate-400">share_reviews</span>
                    </div>
                    <div class="status-badge mt-4 px-4 py-1 rounded-full border-2 border-white hidden"></div>
                    <p class="mt-2 text-sm font-bold text-slate-700 dark:text-slate-300">Nivel 2</p>
                </div>

                <div id="nivel-1" class="level-node relative z-10 flex flex-col items-center group"
                    data-url="../nivel_1/index.html">
                    <div
                        class="main-card w-24 h-24 bg-white dark:bg-slate-800 rounded-2xl flex items-center justify-center shadow-md border-2 border-slate-300">
                        <span class="material-symbols-outlined text-4xl text-slate-400">language</span>
                    </div>
                    <div class="status-badge mt-4 px-4 py-1 rounded-full border-2 border-white hidden"></div>
                    <p class="mt-2 text-sm font-bold text-slate-700 dark:text-slate-300">Nivel 1</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Barra de navegación inferior -->
    <nav
        class="fixed bottom-0 left-0 right-0 z-30 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 px-6 pb-6 pt-3">
        <div class="flex items-center justify-between max-w-md mx-auto">
            <a href="#" class="flex flex-col items-center gap-1 text-primary">
                <div class="h-10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-2xl"
                        style="font-variation-settings: 'FILL' 1">map</span>
                </div>
                <p class="text-[10px] font-bold uppercase tracking-wider">Mapa</p>
            </a>

            <div class="relative -top-6">
                <button id="btnJugarNivel"
                    class="bg-primary text-white size-14 rounded-full flex items-center justify-center shadow-lg shadow-primary/40 border-4 border-white dark:border-background-dark">
                    <span class="material-symbols-outlined text-3xl">play_arrow</span>
                </button>
            </div>
            <a href="/juego-biznova/logros/index.html"
                class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500">
                <div class="h-10 flex items-center justify-center">
                    <span class="material-symbols-outlined text-2xl">emoji_events</span>
                </div>
                <p class="text-[10px] font-bold uppercase tracking-wider">Logros</p>
            </a>

        </div>
    </nav>

    <!-- Elemento oculto (parece requerido por algún prompt o referencia) -->
    <div class="hidden">
        <img alt="" src="https://lh3.googleusercontent.com/...">
    </div>

    <script src="/juego-biznova/mapa_niveles/script.js"></script>
</body>

</html>
