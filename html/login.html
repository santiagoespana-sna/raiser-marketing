<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="../estiloscss/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <a href="../html/index.html" class="btn-home">
        <i class="bi bi-house-door-fill"></i> Volver a Inicio
    </a>

    <div class="container" id="container">
        <div class="form-container sign-up">
            <form>
                <h1>Crear Cuenta</h1>


                <input type="text" placeholder="Nombre de usuario" id="regUser">
                <input type="email" placeholder="Correo electrónico" id="regEmail">
                <input type="password" placeholder="Contraseña" id="regPass">
                <input type="password" placeholder="Confirmar contraseña" id="regPassConfirm">
                <button type="button" onclick="validarRegistro(event)">Registrarse</button>

                <div class="social-icons">
                    <a href="#" class="icon"><i class="bi bi-google"></i></a>
                    <a href="#" class="icon"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="icon"><i class="bi bi-instagram"></i></a>

                </div>
            </form>
        </div>

        <div class="form-container sign-in">
            <form>
                <h1>Iniciar Sesión</h1>


                <input type="email" placeholder="Correo electrónico">
                <input type="password" placeholder="Contraseña">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <button type="button" onclick="login(event)">Entrar</button>

                <div class="social-icons">
                    <a href="#" class="icon"><i class="bi bi-google"></i></a>
                    <a href="#" class="icon"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="icon"><i class="bi bi-instagram"></i></a>


                </div>
            </form>
        </div>

        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>¡Bienvenido de nuevo!</h1>
                    <p>¿Ya tienes una cuenta?</p>
                    <button class="hidden" id="login">Iniciar Sesion</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>¡Hola, Bienvenido!</h1>
                    <p>¿Aún no tienes cuenta?</p>
                    <button class="hidden" id="register">Regístrate</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/archivosjs/login.js"></script>
</body>

</html>
