<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrarse</title>
    <link rel="stylesheet" href="../estiloscss/registro.css">
</head>
<body>

    <!-- Botón de volver -->
    <a href="../html/index.html" class="home-btn">← Atrás</a>

    <div class="login-container">
        <form action="registro.php" method="POST" class="login-form">

            <h2>Crear Cuenta</h2>

            <div class="input-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" name="nombre" id="nombre" placeholder="Tu nombre" required>
            </div>

            <div class="input-group">
                <label for="correo">Correo electrónico</label>
                <input type="email" name="correo" id="correo" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" name="password" id="password" placeholder="******" required>
            </div>

            <div class="input-group">
                <label for="confirmar">Confirmar contraseña</label>
                <input type="password" name="confirmar" id="confirmar" placeholder="******" required>
            </div>

            <button type="submit" class="btn-login">Registrarse</button>

            <p class="registro-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </p>

        </form>
    </div>

</body>
</html>
