<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negocios PRO</title>

    <link rel="stylesheet" href="../estiloscss/negocio.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

    <div class="top-loader"></div>

    <section class="business-page">

        <div class="business-header">
            <a href="index.html" class="logo-link">
                <img src="../imagenes/logo-removebg-preview.png" alt="Logo" class="logo">
            </a>
        </div>

        <div class="header-text">
            <h1 class="section-title">Explora Nuestros Negocios</h1>
            <p class="section-subtitle">
                Descubre los mejores restaurantes, hoteles y tiendas mejor valoradas.
            </p>
        </div>

        <div class="container">

            <div class="top-bar">

                <div class="filter-box">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar negocio...">
                </div>

                <div class="filter-box">
                    <select id="categoryFilter">
                        <option value="all">📂 Todas las categorías</option>
                        <option value="comida">🍔 Comida</option>
                        <option value="hotel">🏨 Hotel</option>
                        <option value="tienda">🛍 Tienda</option>
                    </select>
                </div>

                <div class="filter-box">
                    <select id="ratingFilter">
                        <option value="0">⭐ Todas las estrellas</option>
                        <option value="5">⭐ 5 estrellas</option>
                        <option value="4">⭐ 4 o más</option>
                        <option value="3">⭐ 3 o más</option>
                        <option value="2">⭐ 2 o más</option>
                        <option value="1">⭐ 1 o más</option>
                    </select>
                </div>

                <div class="filter-box">
                    <select id="sortFilter">
                        <option value="rating">🏆 Mejor calificación</option>
                        <option value="name">🔤 Orden alfabético</option>
                    </select>
                </div>

                <div class="filter-box">
                    <button id="openAddModal" class="profile-btn">
                        + Agregar Negocio
                    </button>
                </div>

            </div>

            <p id="resultCount" class="result-count"></p>
            <div id="businessContainer" class="business-grid"></div>

        </div>
    </section>

    <!-- ========================= -->
    <!-- MODAL PERFIL EXISTENTE -->
    <!-- ========================= -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button id="closeModal" class="modal-close">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ========================= -->
    <!-- VISOR DE IMAGEN -->
    <!-- ========================= -->
    <div id="imageViewer" class="image-viewer">
        <button id="closeViewer" class="viewer-close">&times;</button>
        <button id="prevImg" class="viewer-nav left">❮</button>
        <img id="viewerImg">
        <button id="nextImg" class="viewer-nav right">❯</button>
    </div>

    <!-- ========================= -->
    <!-- NUEVO MODAL CENTRADO -->
    <!-- ========================= -->
    <div id="addBusinessModal" class="add-modal">

        <div class="add-modal-content">

            <button id="closeAddBusiness" class="modal-close">&times;</button>

            <h2>Registrar Nuevo Negocio</h2>

            <div class="form-grid">

                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="newNombre">
                </div>

                <div class="form-group">
                    <label>Categoría</label>
                    <select id="newCategoria">
                        <option value="comida">Comida</option>
                        <option value="hotel">Hotel</option>
                        <option value="tienda">Tienda</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Rating</label>
                    <input type="number" id="newRating" step="0.1" min="1" max="5">
                </div>

                <div class="form-group">
                    <label>Horario</label>
                    <div class="double-input">
                        <input type="number" id="newAbre" placeholder="Abre">
                        <input type="number" id="newCierra" placeholder="Cierra">
                    </div>
                </div>

                <div class="form-group full">
                    <label>Ubicación</label>
                    <div id="miniMap" class="mini-map"></div>
                </div>

                <!-- 🔥 CAMBIO IMPORTANTE AQUÍ -->
                <div class="form-group full">
                    <label>Imágenes del Negocio</label>
                    <small style="display:block;margin-bottom:8px;color:#777;">
                        Puedes seleccionar múltiples imágenes.
                        La primera será la portada automáticamente.
                    </small>
                    <input type="file" id="newImagesFile" accept="image/*" multiple>
                </div>

                <div class="form-group full">
                    <label>Descripción</label>
                    <textarea id="newDescripcion"></textarea>
                </div>

            </div>

            <button id="saveBusinessBtn" class="save-btn">
                Crear Negocio
            </button>

        </div>

    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="../archivosjs/negocio.js"></script>

</body>

</html>
