<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil de Negocio</title>
    <link rel="stylesheet" href="negocios.css">
</head>
<body>

    <main class="container">
        <h1 class="page-title">Editar Perfil de Negocio</h1>

        <div class="card">
            <!-- LADO IZQUIERDO: Imágenes -->
            <div class="card-left">
                <div class="image-section">
                    <div id="image-grid" class="image-grid">
                        <div class="image-placeholder">
                            <span>Sin imágenes</span>
                        </div>
                    </div>
                    
                    <div class="image-actions">
                        <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                            + Agregar Imagen
                        </button>
                        <input type="file" id="file-input" accept="image/*" multiple hidden>
                    </div>
                </div>
            </div>

            <!-- LADO DERECHO: Datos -->
            <div class="card-right">
                <div class="form-group">
                    <label for="name">Nombre del Negocio</label>
                    <input type="text" id="name" placeholder="Ej: Consultora Alpha" class="input">
                </div>

                <div class="form-group">
                    <label for="schedule">Horario</label>
                    <input type="text" id="schedule" placeholder="Ej: Lun-Vie 9:00 a 18:00" class="input">
                </div>

                <div class="form-group">
                    <label for="description">Descripción</label>
                    <textarea id="description" placeholder="Breve descripción..." class="input textarea"></textarea>
                </div>

                <!-- Acordeón -->
                <div class="accordion">
                    <button id="toggle-accordion" class="accordion-toggle">···</button>
                    <div id="accordion-content" class="accordion-content">
                        <div class="form-group">
                            <label for="extra-info">Información Adicional</label>
                            <textarea id="extra-info" placeholder="Detalles extra, métodos de pago, etc." class="input textarea"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="negocios.js"></script>
</body>
</html>
